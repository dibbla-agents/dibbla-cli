name: Publish Skill

# Mirrors the embedded skill (the exact bytes go:embed bakes into the
# released binary) from this repo to the public dibbla-agents/skills repo,
# tagged with the same version as the CLI release.
#
# Tag-only trigger so the public repo represents shipped versions only —
# in-flight changes on main don't leak. For every dibbla-cli vX.Y.Z tag,
# the mirror gets a vX.Y.Z tag whose contents match what the CLI binary
# embeds at that version.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Checkout dibbla-cli
        uses: actions/checkout@v4
        with:
          path: source

      - name: Validate embedded skill exists
        run: |
          SKILL_FILE="source/internal/cmd/skills/assets/dibbla/SKILL.md"
          if [ ! -f "$SKILL_FILE" ]; then
            echo "::error::$SKILL_FILE not found — did 'go generate ./...' run before commit?"
            exit 1
          fi
          if ! head -20 "$SKILL_FILE" | grep -q "^name:"; then
            echo "::error::SKILL.md missing 'name' in frontmatter"
            exit 1
          fi
          if ! head -20 "$SKILL_FILE" | grep -q "^description:"; then
            echo "::error::SKILL.md missing 'description' in frontmatter"
            exit 1
          fi
          echo "✓ Embedded skill valid"

      - name: Clone or init public skills repo
        env:
          SKILLS_REPO_TOKEN: ${{ secrets.SKILLS_REPO_TOKEN }}
        run: |
          # Try cloning; if the repo is empty (no main branch), init from scratch
          if git clone --depth 1 "https://x-access-token:${SKILLS_REPO_TOKEN}@github.com/dibbla-agents/skills.git" target 2>/dev/null; then
            echo "✓ Cloned existing repo"
          else
            echo "Repo appears empty — initializing"
            mkdir target && cd target
            git init
            git remote add origin "https://x-access-token:${SKILLS_REPO_TOKEN}@github.com/dibbla-agents/skills.git"
            git checkout -b main
          fi

      - name: Sync skill files
        run: |
          # Mirror the *embedded* skill — the bytes go:embed bakes into the
          # released binary — not the editable .claude/skills source dir.
          # Drift between the two is caught at PR-time by skill-sync-check.yml.
          rm -rf target/dibbla-cli/
          cp -r source/internal/cmd/skills/assets/dibbla target/dibbla-cli

          # Convenience entry point at the root of the public repo.
          cp source/SKILL.md target/SKILL.md

          # Seed README on first publish; never overwrite human edits there.
          if [ ! -f target/README.md ]; then
            cp source/skills-repo-README.md target/README.md
          fi

          cd target
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "CONTENT_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "CONTENT_CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Commit and tag
        run: |
          cd target
          VERSION="${GITHUB_REF#refs/tags/}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Always tag the mirror, even when content hasn't changed since
          # the previous version — multiple tags can point at the same
          # commit, and consumers need every CLI tag to resolve in the
          # mirror. Commit only if content actually changed.
          if [ "$CONTENT_CHANGED" = "true" ]; then
            git add -A
            git commit -m "Update dibbla skill to $VERSION"
          else
            echo "Content unchanged since last sync — tagging existing HEAD"
          fi

          git tag "$VERSION"
          git push origin main --tags

          echo "✓ Published $VERSION to dibbla-agents/skills"

      - name: Notify Slack
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then status="success"; else status="failed"; fi
          cluster_ip="$(dig +short ash.dibbla.net @1.1.1.1 | head -1)"
          curl -fsS -X POST https://slack-bot.dibbla.net/api/notify \
            --resolve "slack-bot.dibbla.net:443:${cluster_ip}" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "service": "dibbla-cli-skill",
            "environment": "prod",
            "tag": "${{ github.sha }}",
            "status": "${status}",
            "actor": "${{ github.actor }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )" || true
