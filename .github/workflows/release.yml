name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Read the version from go.mod so the release toolchain can't drift
          # behind the module's `go` directive (GOTOOLCHAIN=local blocks upgrades).
          go-version-file: "go.mod"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Package skill archive
        run: |
          mkdir -p dist
          cd .claude/skills
          zip -r ../../dist/dibbla-cli-skill.zip dibbla/
          echo "✓ Packaged dibbla-cli-skill.zip (will be attached to release)"

      - name: Attach skill archive to release
        id: attach
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" dist/dibbla-cli-skill.zip --clobber

      - name: Notify Slack
        if: always()
        run: |
          if [ "${{ steps.attach.outcome }}" = "success" ]; then status="success"; else status="failed"; fi
          cluster_ip="$(dig +short ash.dibbla.net @1.1.1.1 | head -1)"
          curl -fsS -X POST https://slack-bot.dibbla.net/api/notify \
            --resolve "slack-bot.dibbla.net:443:${cluster_ip}" \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_API_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "service": "dibbla-cli",
            "environment": "release",
            "tag": "${GITHUB_REF#refs/tags/}",
            "status": "${status}",
            "actor": "${{ github.actor }}",
            "run_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          )" || true

  sign-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Sign and notarize macOS binaries
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          for ARCH in amd64 arm64; do
            ARCHIVE="dibbla_${VERSION}_darwin_${ARCH}"
            TARBALL="${ARCHIVE}.tar.gz"

            echo "==> Signing ${TARBALL}"

            gh release download "$TAG" -p "$TARBALL" -D /tmp/sign -R "$GITHUB_REPOSITORY"

            mkdir -p /tmp/sign/extract
            tar -xzf "/tmp/sign/${TARBALL}" -C /tmp/sign/extract

            codesign --force --options runtime \
              --sign "$APPLE_DEVELOPER_ID" \
              --timestamp \
              /tmp/sign/extract/dibbla

            ditto -c -k /tmp/sign/extract/dibbla /tmp/sign/dibbla-notarize.zip

            xcrun notarytool submit /tmp/sign/dibbla-notarize.zip \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait

            tar -czf "/tmp/sign/${TARBALL}" -C /tmp/sign/extract .
            gh release upload "$TAG" "/tmp/sign/${TARBALL}" --clobber -R "$GITHUB_REPOSITORY"

            rm -rf /tmp/sign/extract /tmp/sign/dibbla-notarize.zip
          done

          # Update checksums for the replaced archives
          gh release download "$TAG" -p "checksums.txt" -D /tmp/sign -R "$GITHUB_REPOSITORY"
          for ARCH in amd64 arm64; do
            TARBALL="dibbla_${VERSION}_darwin_${ARCH}.tar.gz"
            NEW_SUM=$(shasum -a 256 "/tmp/sign/${TARBALL}" | awk '{print $1}')
            sed -i '' "s/^[a-f0-9]*  ${TARBALL}$/${NEW_SUM}  ${TARBALL}/" /tmp/sign/checksums.txt
          done
          gh release upload "$TAG" /tmp/sign/checksums.txt --clobber -R "$GITHUB_REPOSITORY"

          rm -rf /tmp/sign

      - name: Update Homebrew formula checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Download the signed tarballs to compute checksums
          mkdir -p /tmp/brew
          for ARCH in amd64 arm64; do
            TARBALL="dibbla_${VERSION}_darwin_${ARCH}.tar.gz"
            gh release download "$TAG" -p "$TARBALL" -D /tmp/brew -R "$GITHUB_REPOSITORY"
          done

          SHA_AMD64=$(shasum -a 256 "/tmp/brew/dibbla_${VERSION}_darwin_amd64.tar.gz" | awk '{print $1}')
          SHA_ARM64=$(shasum -a 256 "/tmp/brew/dibbla_${VERSION}_darwin_arm64.tar.gz" | awk '{print $1}')

          # Fetch current formula
          FORMULA=$(gh api repos/dibbla-agents/homebrew-tap/contents/Formula/dibbla.rb \
            -H "Authorization: token $HOMEBREW_TAP_GITHUB_TOKEN" \
            --jq '.content' | base64 -d)
          FORMULA_SHA=$(gh api repos/dibbla-agents/homebrew-tap/contents/Formula/dibbla.rb \
            -H "Authorization: token $HOMEBREW_TAP_GITHUB_TOKEN" \
            --jq '.sha')

          # Replace darwin checksums in formula
          # Match the sha256 line that follows the darwin_amd64 url
          FORMULA=$(echo "$FORMULA" | awk -v new="$SHA_AMD64" '
            /darwin_amd64\.tar\.gz/ { found_amd64=1 }
            found_amd64 && /sha256 "/ { sub(/sha256 "[a-f0-9]+"/, "sha256 \"" new "\""); found_amd64=0 }
            { print }
          ')
          FORMULA=$(echo "$FORMULA" | awk -v new="$SHA_ARM64" '
            /darwin_arm64\.tar\.gz/ { found_arm64=1 }
            found_arm64 && /sha256 "/ { sub(/sha256 "[a-f0-9]+"/, "sha256 \"" new "\""); found_arm64=0 }
            { print }
          ')

          # Push updated formula
          ENCODED=$(echo "$FORMULA" | base64)
          gh api repos/dibbla-agents/homebrew-tap/contents/Formula/dibbla.rb \
            -X PUT \
            -H "Authorization: token $HOMEBREW_TAP_GITHUB_TOKEN" \
            -f message="Update darwin checksums for v${VERSION} (signed binaries)" \
            -f content="$ENCODED" \
            -f sha="$FORMULA_SHA"

          rm -rf /tmp/brew
          echo "✓ Updated Homebrew formula with signed checksums"

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

  sign-windows:
    # Runs after sign-macos (not in parallel): both jobs edit and --clobber the
    # single shared checksums.txt, so they must serialize to avoid losing edits.
    needs: [release, sign-macos]
    runs-on: windows-latest
    steps:
      - name: Download and stage Windows binaries
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $signDir = Join-Path $env:RUNNER_TEMP 'sign'
          New-Item -ItemType Directory -Force -Path $signDir | Out-Null

          foreach ($arch in @('amd64', 'arm64')) {
            $zip = "dibbla_${version}_windows_${arch}.zip"
            gh release download $tag -p $zip -D $signDir --clobber -R $env:GITHUB_REPOSITORY
            if ($LASTEXITCODE -ne 0) { throw "Failed to download $zip" }
            $dest = Join-Path $signDir $arch
            New-Item -ItemType Directory -Force -Path $dest | Out-Null
            Expand-Archive -Path (Join-Path $signDir $zip) -DestinationPath $dest -Force
            if (-not (Test-Path (Join-Path $dest 'dibbla.exe'))) { throw "dibbla.exe not found in $zip" }
          }

          "TAG=$tag"          | Out-File -FilePath $env:GITHUB_ENV -Append
          "VERSION=$version"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "SIGN_DIR=$signDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sign Windows binaries
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ env.SIGN_DIR }}
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify, repackage, and publish signed binaries
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64' } | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }

          foreach ($arch in @('amd64', 'arm64')) {
            $exe = Join-Path $env:SIGN_DIR "$arch\dibbla.exe"
            & $signtool.FullName verify /pa /v $exe
            if ($LASTEXITCODE -ne 0) { throw "Signature verification failed for $arch" }

            $zip = "dibbla_${env:VERSION}_windows_${arch}.zip"
            $zipPath = Join-Path $env:SIGN_DIR $zip
            Remove-Item $zipPath -Force
            Compress-Archive -Path $exe -DestinationPath $zipPath -Force
            gh release upload $env:TAG $zipPath --clobber -R $env:GITHUB_REPOSITORY
            if ($LASTEXITCODE -ne 0) { throw "Failed to upload $zip" }
          }

      - name: Update checksums for the re-signed Windows archives
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $checksums = Join-Path $env:SIGN_DIR 'checksums.txt'
          gh release download $env:TAG -p 'checksums.txt' -D $env:SIGN_DIR --clobber -R $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) { throw "Failed to download checksums.txt" }

          # GoReleaser format: "<sha256>  <filename>" (two spaces). Touch only the
          # two Windows lines; leave darwin/linux entries (incl. sign-macos's) intact.
          $content = Get-Content $checksums -Raw
          foreach ($arch in @('amd64', 'arm64')) {
            $zip = "dibbla_${env:VERSION}_windows_${arch}.zip"
            $hash = (Get-FileHash -Algorithm SHA256 (Join-Path $env:SIGN_DIR $zip)).Hash.ToLower()
            $pattern = "(?m)^[0-9a-f]+  $([regex]::Escape($zip))$"
            $content = $content -replace $pattern, "$hash  $zip"
          }
          [System.IO.File]::WriteAllText($checksums, $content)

          gh release upload $env:TAG $checksums --clobber -R $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) { throw "Failed to upload checksums.txt" }
